# ============================================================
# SERVER
# ============================================================
server.port=8080

# ============================================================
# DATABASE — PostgreSQL on Docker port 5433 (local dev)
# Override with env vars in production (Azure Container Apps)
# ============================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5433/urlshortener}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ============================================================
# REDIS — local dev on default port 6379
# Override with Azure Redis connection string in production
# ============================================================
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${SPRING_DATA_REDIS_SSL_ENABLED:false}

# Cache type: redis (requires spring-boot-starter-data-redis on classpath)
spring.cache.type=redis

# ============================================================
# JWT — CHANGE the secret before deploying!
# Must be at least 32 characters (256 bits) for HS256.
# ============================================================
jwt.secret=${JWT_SECRET:my-very-secret-key-that-is-at-least-32-characters-long}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ============================================================
# APP
# ============================================================
spring.application.name=urlshortener

# Base URL used when building the full short URL in responses
app.base-url=${APP_BASE_URL:http://localhost:8080}

# ============================================================
# SPRINGDOC / SWAGGER
# ============================================================
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.show-actuator=false
